server {
    listen 8080;
    server_name _;
    root /usr/share/nginx/html;
    index index.html;

    # Behind Cloud Run's proxy nginx doesn't know the external host/scheme, so an
    # absolute trailing-slash redirect (from try_files $uri/) 301s to a broken
    # http://<internal-host>:8080/… URL. Emit RELATIVE redirects so the browser
    # keeps https://meetlisa.ai — fixes every no-slash route (/privacy, /install, …).
    absolute_redirect off;

    # Compress text responses on the origin→edge hop (Cloudflare re-compresses to
    # the browser). Images/fonts are already compressed, so skip them.
    gzip on;
    gzip_comp_level 6;
    gzip_min_length 512;
    gzip_vary on;
    gzip_types text/plain text/css application/javascript application/json image/svg+xml application/xml application/manifest+json;

    # Astro emits <route>/index.html — resolve dirs, then .html, then 404 page.
    location / {
        try_files $uri $uri/ $uri.html =404;
        # HTML always revalidates so a deploy shows up immediately (cheap 304s via ETag).
        add_header Cache-Control "public, max-age=0, must-revalidate";
    }

    error_page 404 /404.html;

    # Content-hashed build output (filename changes with content) — cache forever.
    location /_astro/ {
        expires 1y;
        add_header Cache-Control "public, max-age=31536000, immutable";
        access_log off;
    }

    # Self-hosted fonts — stable names, long-lived.
    location /fonts/ {
        expires 1y;
        add_header Cache-Control "public, max-age=31536000, immutable";
        access_log off;
    }

    # Images and other static assets (Cloudflare also caches at edge).
    location /assets/ {
        expires 30d;
        add_header Cache-Control "public, max-age=2592000, immutable";
    }
}
