# XcodeGen spec for Lisa Pocket — the iOS companion (docs/IOS_COMPANION_PLAN.md).
# Two targets: the app + a WidgetKit extension that hosts the Live Activity /
# Dynamic Island. `AgentActivityAttributes` (Shared/) is compiled into both.
# Generate + build/verify with ./build.sh (simulator, no signing).
name: LisaPocket
options:
  bundleIdPrefix: ai.meetlisa
  deploymentTarget:
    iOS: "17.0"
  createIntermediateGroups: true
settings:
  base:
    SWIFT_VERSION: "5.0"
    # Must be >= the app's App Store version (currently 1.0, PREPARE_FOR_SUBMISSION).
    # A lower CFBundleShortVersionString (this was "0.1.0") is silently REJECTED by
    # App Store Connect at ingestion — upload "succeeds" but no build ever appears.
    MARKETING_VERSION: "1.1"
    CURRENT_PROJECT_VERSION: "1"
    TARGETED_DEVICE_FAMILY: "1,2"
    # Automatic signing for device archives (testflight.sh): Xcode picks the
    # Development identity for the archive and re-signs Distribution at export.
    # Simulator builds (build.sh) pass CODE_SIGNING_ALLOWED=NO on the command
    # line, so they need no certificate — keep the disable-flags OUT of the project
    # so they don't clear the archive's signing identity (which left the widget
    # unsigned and broke `testflight.sh`).
    CODE_SIGN_STYLE: Automatic
    DEVELOPMENT_TEAM: "9LH9NBX7P4"
targets:
  LisaPocket:
    type: application
    platform: iOS
    sources:
      - path: Sources
      - path: Shared
    dependencies:
      - target: LisaPocketWidgets
    info:
      path: Sources/Info.plist
      properties:
        CFBundleDisplayName: Lisa Pocket
        UILaunchScreen: {}
        NSSupportsLiveActivities: true
        NSCameraUsageDescription: "Scan the pairing QR code Lisa shows on your Mac."
        NSFaceIDUsageDescription: "Unlock Lisa Pocket with Face ID."
        NSLocalNetworkUsageDescription: "Connect to the Lisa backend running on your Mac over your local network."
        ITSAppUsesNonExemptEncryption: false
        # Portrait-only on iPhone; iPad declares all four orientations, which App
        # Store validation requires for any iPad-capable (device family 2) app that
        # doesn't opt out of multitasking. Without these the upload is rejected
        # ("No orientations were specified … To support iPad multitasking …").
        UISupportedInterfaceOrientations:
          - UIInterfaceOrientationPortrait
        UISupportedInterfaceOrientations~ipad:
          - UIInterfaceOrientationPortrait
          - UIInterfaceOrientationPortraitUpsideDown
          - UIInterfaceOrientationLandscapeLeft
          - UIInterfaceOrientationLandscapeRight
        CFBundleURLTypes:
          - CFBundleURLName: ai.meetlisa.main
            CFBundleURLSchemes:
              - lisapocket
        NSAppTransportSecurity:
          NSAllowsLocalNetworking: true
    entitlements:
      path: Sources/LisaPocket.entitlements
      properties:
        com.apple.security.application-groups:
          - group.ai.meetlisa.main
        aps-environment: development
        # Sign in with Apple (B1, PLAN_ACCOUNTS_BILLING): accounts are now the
        # primary cloud flow and in-app deletion ships alongside (5.1.1(v)), so
        # the entitlement is back. Requires the capability enabled on the App ID
        # in the Developer portal before a signed (device/TestFlight) build.
        com.apple.developer.applesignin:
          - Default
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: ai.meetlisa.main
        # LISA_ENABLE_SIWA: compile in the Sign in with Apple UI (B1 — accounts
        # are the primary cloud flow now). $(inherited) keeps DEBUG etc. intact.
        SWIFT_ACTIVE_COMPILATION_CONDITIONS: "$(inherited) LISA_ENABLE_SIWA"

  LisaPocketWidgets:
    type: app-extension
    platform: iOS
    sources:
      - path: Widgets
      - path: Shared
    info:
      path: Widgets/Info.plist
      properties:
        CFBundleDisplayName: Lisa Widgets
        NSExtension:
          NSExtensionPointIdentifier: com.apple.widgetkit-extension
    entitlements:
      path: Widgets/LisaPocketWidgets.entitlements
      properties:
        com.apple.security.application-groups:
          - group.ai.meetlisa.main
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: ai.meetlisa.main.widgets

  # Logic tests for the pure helpers (parsing / bucketing / sorting). Hosted by the
  # app so `@testable import LisaPocket` resolves; run with: ./build.sh test (or
  # xcodebuild test). XcodeGen sets TEST_HOST from the app dependency.
  LisaPocketTests:
    type: bundle.unit-test
    platform: iOS
    sources:
      - path: Tests
    dependencies:
      - target: LisaPocket
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: ai.meetlisa.main.tests
        GENERATE_INFOPLIST_FILE: YES

schemes:
  LisaPocket:
    build:
      targets:
        LisaPocket: all
    test:
      targets:
        - LisaPocketTests
