# XcodeGen spec for Lisa Pocket — the iOS companion (docs/IOS_COMPANION_PLAN.md).
# Two targets: the app + a WidgetKit extension that hosts the Live Activity /
# Dynamic Island. `AgentActivityAttributes` (Shared/) is compiled into both.
# Generate + build/verify with ./build.sh (simulator, no signing).
name: LisaPocket
options:
  bundleIdPrefix: ai.meetlisa
  deploymentTarget:
    iOS: "17.0"
  createIntermediateGroups: true
settings:
  base:
    SWIFT_VERSION: "5.0"
    MARKETING_VERSION: "0.1.0"
    CURRENT_PROJECT_VERSION: "1"
    TARGETED_DEVICE_FAMILY: "1,2"
    CODE_SIGNING_REQUIRED: NO
    CODE_SIGNING_ALLOWED: NO
    CODE_SIGN_IDENTITY: ""
targets:
  LisaPocket:
    type: application
    platform: iOS
    sources:
      - path: Sources
      - path: Shared
    dependencies:
      - target: LisaPocketWidgets
    info:
      path: Sources/Info.plist
      properties:
        CFBundleDisplayName: Lisa Pocket
        UILaunchScreen: {}
        NSSupportsLiveActivities: true
        NSCameraUsageDescription: "Scan the pairing QR code Lisa shows on your Mac."
        NSFaceIDUsageDescription: "Unlock Lisa Pocket with Face ID."
        NSLocalNetworkUsageDescription: "Connect to the Lisa backend running on your Mac over your local network."
        ITSAppUsesNonExemptEncryption: false
        CFBundleURLTypes:
          - CFBundleURLName: ai.meetlisa.main
            CFBundleURLSchemes:
              - lisapocket
        NSAppTransportSecurity:
          NSAllowsLocalNetworking: true
    entitlements:
      path: Sources/LisaPocket.entitlements
      properties:
        com.apple.security.application-groups:
          - group.ai.meetlisa.main
        aps-environment: development
        com.apple.developer.applesignin:
          - Default
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: ai.meetlisa.main

  LisaPocketWidgets:
    type: app-extension
    platform: iOS
    sources:
      - path: Widgets
      - path: Shared
    info:
      path: Widgets/Info.plist
      properties:
        CFBundleDisplayName: Lisa Widgets
        NSExtension:
          NSExtensionPointIdentifier: com.apple.widgetkit-extension
    entitlements:
      path: Widgets/LisaPocketWidgets.entitlements
      properties:
        com.apple.security.application-groups:
          - group.ai.meetlisa.main
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: ai.meetlisa.main.widgets

  # Logic tests for the pure helpers (parsing / bucketing / sorting). Hosted by the
  # app so `@testable import LisaPocket` resolves; run with: ./build.sh test (or
  # xcodebuild test). XcodeGen sets TEST_HOST from the app dependency.
  LisaPocketTests:
    type: bundle.unit-test
    platform: iOS
    sources:
      - path: Tests
    dependencies:
      - target: LisaPocket
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: ai.meetlisa.main.tests
        GENERATE_INFOPLIST_FILE: YES

schemes:
  LisaPocket:
    build:
      targets:
        LisaPocket: all
    test:
      targets:
        - LisaPocketTests
